name: LINE Scheduled Broadcast

on:
  workflow_dispatch:
    inputs:
      message:
        description: Message text to broadcast
        required: false
        type: string
  schedule:
    # Monday 09:00 Asia/Taipei.
    - cron: '0 1 * * 1'

jobs:
  broadcast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send LINE broadcast
        run: npm run broadcast -- "$LINE_BROADCAST_TEXT"
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_BROADCAST_TEXT: ${{ github.event.inputs.message || vars.LINE_BROADCAST_TEXT || '本週提醒：記得查看最新活動與表單。' }}
